<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5F1EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>WORKNIC 마끼다 가격 검색</title>

<!-- ===== PWA 설정 ===== -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WORKNIC">

<script>
  // Service Worker 등록 - 오프라인 작동용
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('[WORKNIC] SW registered'))
        .catch(err => console.log('[WORKNIC] SW failed:', err));
    });
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spoqa+Han+Sans+Neo:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F5F1EB;
    --ivory-2: #EDE7DE;
    --ivory-3: #E5DCCE;
    --dark: #2A2723;
    --dark-80: rgba(42, 39, 35, 0.8);
    --dark-60: rgba(42, 39, 35, 0.6);
    --dark-40: rgba(42, 39, 35, 0.4);
    --dark-20: rgba(42, 39, 35, 0.2);
    --dark-10: rgba(42, 39, 35, 0.08);
    --amber: #BF8A30;
    --amber-soft: #D9A851;
    --amber-bg: #FBF4DD;
    --red: #B84A3E;
    --red-bg: #FBEEEC;
    --green: #5B7A3E;
    --green-bg: #EEF3E5;
    --line: rgba(42, 39, 35, 0.1);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--ivory);
    color: var(--dark);
    font-family: 'Spoqa Han Sans Neo', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overscroll-behavior: none;
  }
  body {
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    min-height: 100vh;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* ========== Header ========== */
  header {
    position: sticky;
    top: 0;
    background: var(--ivory);
    border-bottom: 1px solid var(--line);
    z-index: 50;
    padding-top: var(--safe-top);
  }
  .header-inner {
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand .comma-logo {
    width: 22px;
    height: 25px;
    color: var(--dark);
    flex-shrink: 0;
  }
  .brand .comma-logo svg { width: 100%; height: 100%; display: block; }
  .brand-text {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }
  .brand-sub {
    font-size: 10px;
    color: var(--dark-60);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.3px;
  }
  .header-tools {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    color: var(--dark-60);
    font-size: 16px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--ivory-2); }
  .icon-btn.active { color: var(--amber); background: var(--amber-bg); }

  /* ========== Search Bar ========== */
  .search-wrap {
    padding: 6px 20px 14px;
    background: var(--ivory);
  }
  .search-box {
    position: relative;
    background: var(--ivory-2);
    border-radius: 12px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
  }
  .search-box:focus-within {
    background: var(--ivory-3);
  }
  .search-box svg { color: var(--dark-60); flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 0;
    font-family: inherit;
    font-size: 16px;
    font-weight: 400;
    color: var(--dark);
  }
  .search-input::placeholder { color: var(--dark-40); font-weight: 300; }
  .search-clear {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--dark-20);
    color: var(--ivory);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
  }
  .search-clear.show { display: flex; }

  /* ========== Meta row ========== */
  .meta-row {
    padding: 0 20px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--dark-60);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.3px;
  }
  .dealer-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 14px;
    background: var(--ivory-2);
    font-size: 10px;
    transition: all 0.15s;
  }
  .dealer-toggle.visible {
    background: var(--red-bg);
    color: var(--red);
  }
  .dealer-toggle .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dark-40);
  }
  .dealer-toggle.visible .dot {
    background: var(--red);
  }

  /* ========== Results ========== */
  .results {
    padding: 4px 0 120px;
  }
  .section-label {
    font-size: 10px;
    color: var(--dark-60);
    padding: 14px 20px 6px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .product-card {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 12px;
    transition: background 0.1s;
    position: relative;
  }
  .product-card:active { background: var(--ivory-2); }
  .product-card.discontinued { opacity: 0.5; }
  .product-main {
    flex: 1;
    min-width: 0;
  }
  .product-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--dark);
    margin-bottom: 3px;
    word-break: break-all;
  }
  .product-name {
    font-size: 13px;
    color: var(--dark-80);
    line-height: 1.4;
    margin-bottom: 6px;
    font-weight: 300;
  }
  .product-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3px;
  }
  .tag {
    padding: 2px 7px;
    background: var(--ivory-2);
    color: var(--dark-60);
    border-radius: 3px;
    text-transform: uppercase;
  }
  .tag.voltage { background: var(--amber-bg); color: var(--amber); }
  .tag.baretool { background: var(--dark); color: var(--ivory); }
  .tag.discontinued { background: var(--red-bg); color: var(--red); }
  .tag.new { background: var(--green-bg); color: var(--green); }
  .product-right {
    text-align: right;
    flex-shrink: 0;
    min-width: 90px;
  }
  .price-consumer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--dark);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .price-consumer-label {
    font-size: 9px;
    color: var(--dark-60);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    text-transform: uppercase;
  }
  .price-dealer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
    display: none;
  }
  .price-dealer.show { display: block; }
  .price-dealer-label {
    font-size: 8px;
    color: var(--red);
    letter-spacing: 0.5px;
    margin-bottom: 1px;
    text-transform: uppercase;
  }

  /* ========== Empty / Loading ========== */
  .empty-state {
    padding: 60px 30px;
    text-align: center;
    color: var(--dark-60);
  }
  .empty-state .big-comma {
    width: 40px;
    height: 45px;
    margin: 0 auto 20px;
    color: var(--amber);
    opacity: 0.5;
  }
  .empty-state .big-comma svg { width: 100%; height: 100%; }
  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }
  .empty-state p.small {
    font-size: 11px;
    margin-top: 8px;
    color: var(--dark-40);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ========== Recent searches ========== */
  .recent-wrap {
    padding: 20px;
  }
  .recent-title {
    font-size: 10px;
    color: var(--dark-60);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .recent-clear-btn {
    font-size: 10px;
    color: var(--dark-40);
    letter-spacing: 0.3px;
  }
  .recent-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .recent-chip {
    padding: 6px 12px;
    background: var(--ivory-2);
    border-radius: 14px;
    font-size: 12px;
    color: var(--dark-60);
    font-family: 'IBM Plex Mono', monospace;
    transition: background 0.15s;
  }
  .recent-chip:active { background: var(--ivory-3); }

  /* ========== Detail Sheet (Modal) ========== */
  .sheet-bg {
    position: fixed;
    inset: 0;
    background: rgba(42, 39, 35, 0.45);
    z-index: 100;
    display: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .sheet-bg.show { display: block; animation: fadeIn 0.2s; }

  .sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--ivory);
    border-radius: 20px 20px 0 0;
    z-index: 101;
    max-height: 90vh;
    overflow-y: auto;
    padding-bottom: calc(24px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
  }
  .sheet.show { transform: translateY(0); }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--dark-20);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .sheet-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--line);
  }
  .sheet-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
    word-break: break-all;
  }
  .sheet-name {
    font-size: 13px;
    color: var(--dark-60);
    line-height: 1.5;
    font-weight: 300;
  }
  .sheet-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .price-blocks {
    padding: 20px 24px;
  }
  .price-block {
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 10px;
  }
  .price-block.consumer {
    background: var(--dark);
    color: var(--ivory);
  }
  .price-block.dealer {
    background: var(--red-bg);
    border: 1px solid rgba(184, 74, 62, 0.15);
    display: none;
  }
  .price-block.dealer.show { display: block; }
  .price-block-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
  }
  .price-block.consumer .price-block-label { color: var(--ivory); opacity: 0.7; }
  .price-block.dealer .price-block-label { color: var(--red); opacity: 1; }
  .price-block-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  .price-block-value .won {
    font-size: 14px;
    font-weight: 400;
    margin-left: 4px;
    opacity: 0.7;
  }
  .price-block.dealer .price-block-value { color: var(--red); }
  .internal-badge {
    font-size: 9px;
    padding: 2px 8px;
    background: var(--red);
    color: var(--ivory);
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* Template tabs */
  .tabs {
    padding: 12px 24px 0;
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.3px;
    color: var(--dark-60);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .tab-btn.active {
    color: var(--dark);
    border-bottom-color: var(--amber);
    font-weight: 500;
  }

  .template-preview {
    padding: 18px 24px 0;
  }
  .template-box {
    background: var(--ivory-2);
    border-radius: 10px;
    padding: 18px;
    font-size: 13px;
    color: var(--dark-80);
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: 'Spoqa Han Sans Neo', sans-serif;
    letter-spacing: 0.1px;
    min-height: 200px;
    position: relative;
  }
  .template-box .comma-inline {
    display: inline-block;
    width: 10px;
    height: 12px;
    color: var(--amber);
    vertical-align: -1px;
  }
  .template-box .comma-inline svg { width: 100%; height: 100%; display: block; }

  /* Copy button */
  .copy-actions {
    padding: 16px 24px 0;
  }
  .copy-btn {
    width: 100%;
    padding: 16px;
    background: var(--dark);
    color: var(--ivory);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
  }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied {
    background: var(--green);
  }
  .copy-btn svg {
    width: 18px;
    height: 18px;
  }

  /* ========== Toast ========== */
  .toast {
    position: fixed;
    bottom: calc(32px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark);
    color: var(--ivory);
    padding: 12px 22px;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2px;
    opacity: 0;
    transition: all 0.25s;
    z-index: 200;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ========== Stats bar ========== */
  .stats-bar {
    display: flex;
    gap: 0;
    padding: 0 20px 6px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--dark-40);
    letter-spacing: 0.3px;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Larger screens */
  @media (min-width: 700px) {
    body { max-width: 500px; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.05); min-height: 100vh; }
    .sheet { max-width: 500px; margin: 0 auto; right: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <span class="comma-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4607 5398" fill="currentColor" aria-hidden="true"><g transform="translate(-1679.56,6649.23) scale(1,-1)"><path d="M4075 6630 c-60 -10 -142 -19 -182 -19 -53 -1 -93 -9 -155 -31 -46 -16 -201 -59 -345 -94 -144 -36 -294 -79 -335 -95 -96 -41 -464 -236 -553 -294 -106 -69 -337 -269 -362 -313 -12 -22 -39 -86 -61 -144 -21 -58 -55 -136 -74 -175 -57 -112 -101 -226 -172 -440 -36 -110 -80 -240 -97 -290 -64 -186 -72 -250 -44 -360 16 -60 166 -358 263 -523 165 -280 368 -506 678 -754 154 -123 275 -195 566 -337 276 -135 386 -179 498 -200 128 -24 358 -44 535 -46 123 -1 190 -6 193 -13 12 -37 -148 -234 -387 -473 l-196 -196 -207 -87 c-113 -49 -209 -94 -212 -102 -3 -8 5 -69 19 -136 22 -111 26 -124 61 -159 76 -78 172 -97 489 -98 197 -1 403 14 493 34 108 25 235 101 405 243 116 97 493 467 557 548 54 67 311 488 370 604 21 41 59 127 85 190 26 63 89 212 140 330 112 262 144 355 195 580 52 224 56 287 36 485 -43 412 -121 737 -269 1122 -51 130 -52 132 -182 293 -65 80 -171 224 -235 320 -134 200 -211 279 -434 443 -143 105 -224 150 -311 172 -154 38 -578 46 -770 15z"/></g></svg></span>
      <div>
        <div class="brand-text">WORKNIC 가격검색</div>
        <div class="brand-sub">MAKITA PRICE LOOKUP</div>
      </div>
    </div>
    <div class="header-tools">
      <button class="icon-btn" id="theme-btn" title="화면 밝기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search" placeholder="모델명, 제품명 검색 (예: DTD172, 임팩트)" autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="search-clear" id="search-clear" aria-label="검색어 지우기">×</button>
    </div>
  </div>
  <div class="meta-row">
    <span id="result-count">3,407개 제품</span>
    <button class="dealer-toggle" id="dealer-toggle">
      <span class="dot"></span>
      <span id="dealer-toggle-label">대리점가 보기</span>
    </button>
  </div>
</header>

<div class="results" id="results"></div>

<!-- Detail Sheet -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-code" id="sheet-code"></div>
    <div class="sheet-name" id="sheet-name"></div>
    <div class="sheet-tags" id="sheet-tags"></div>
  </div>

  <div class="price-blocks">
    <div class="price-block consumer">
      <div class="price-block-label">
        <span>소비자가 (고객 안내용)</span>
      </div>
      <div class="price-block-value mono" id="sheet-consumer-price">-</div>
    </div>
    <div class="price-block dealer" id="sheet-dealer-block">
      <div class="price-block-label">
        <span>대리점가 (매입가)</span>
        <span class="internal-badge">내부용</span>
      </div>
      <div class="price-block-value mono" id="sheet-dealer-price">-</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-template="A">담백형</button>
    <button class="tab-btn" data-template="B">브랜드형</button>
    <button class="tab-btn" data-template="C">실무형</button>
  </div>

  <div class="template-preview">
    <div class="template-box" id="template-preview"></div>
  </div>

  <div class="copy-actions">
    <button class="copy-btn" id="copy-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      <span>고객 안내 문자 복사</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================

const CONSUMER_MULTIPLIER = 1.3;

// 상태
let state = {
  query: '',
  showDealer: false,
  recent: JSON.parse(localStorage.getItem('wk_recent') || '[]'),
  currentProduct: null,
  currentTemplate: 'A',
  darkMode: localStorage.getItem('wk_dark') === '1'
};

// ============================================
// 유틸
// ============================================
function fmtPrice(n) {
  if (!n) return '-';
  return n.toLocaleString('ko-KR');
}

function calcConsumer(dealer) {
  if (!dealer) return 0;
  // 1.3배 후 100원 단위 올림
  const raw = dealer * CONSUMER_MULTIPLIER;
  return Math.ceil(raw / 100) * 100;
}

function normalize(s) {
  return (s || '').toString().toLowerCase().replace(/[\s\-_\.]/g, '');
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ============================================
// 검색 로직
// ============================================
function search(q) {
  if (!q || q.trim().length === 0) return [];
  const nq = normalize(q);
  const terms = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const ntokens = terms.map(normalize);

  const results = [];
  for (let i = 0; i < PRODUCTS.length; i++) {
    const p = PRODUCTS[i];
    const nCode = normalize(p.c);
    const nName = normalize(p.n);
    const nC1 = normalize(p.c1);
    const nC2 = normalize(p.c2);

    let score = 0;

    // 코드 정확 매칭 (최상위)
    if (nCode === nq) score += 1000;
    // 코드 시작 매칭
    else if (nCode.startsWith(nq)) score += 500;
    // 코드 부분 매칭
    else if (nCode.includes(nq)) score += 200;

    // 모든 토큰이 매칭되어야 (AND)
    let allMatch = true;
    for (const nt of ntokens) {
      if (nCode.includes(nt) || nName.includes(nt) || nC1.includes(nt) || nC2.includes(nt)) {
        if (nCode.includes(nt)) score += 50;
        else if (nName.includes(nt)) score += 20;
        else score += 5;
      } else {
        allMatch = false;
        break;
      }
    }

    if (allMatch && score > 0) {
      // 단종은 점수 감점
      if (p.s === '단종') score -= 300;
      results.push({ p, score });
    }
  }

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 50).map(r => r.p);
}

// ============================================
// 렌더링
// ============================================
function render() {
  const resultsEl = document.getElementById('results');
  const countEl = document.getElementById('result-count');

  if (!state.query) {
    // 빈 상태 - 최근 검색 + 안내
    let html = '';
    if (state.recent.length > 0) {
      html += `
        <div class="recent-wrap">
          <div class="recent-title">
            <span>최근 검색</span>
            <button class="recent-clear-btn" onclick="clearRecent()">지우기</button>
          </div>
          <div class="recent-items">
            ${state.recent.map(q => `<button class="recent-chip" onclick="setQuery('${escapeHtml(q)}')">${escapeHtml(q)}</button>`).join('')}
          </div>
        </div>
      `;
    }
    html += `
      <div class="empty-state">
        <p>모델명이나 제품명을 검색하세요</p>
        <p class="small">예: DTD172 · 임팩트 · 원형톱</p>
      </div>
    `;
    resultsEl.innerHTML = html;
    countEl.textContent = `${PRODUCTS.length.toLocaleString()}개 제품`;
    return;
  }

  const results = search(state.query);
  countEl.textContent = `${results.length}개 결과`;

  if (results.length === 0) {
    resultsEl.innerHTML = `
      <div class="empty-state">
        <div class="big-comma"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4607 5398" fill="currentColor" aria-hidden="true"><g transform="translate(-1679.56,6649.23) scale(1,-1)"><path d="M4075 6630 c-60 -10 -142 -19 -182 -19 -53 -1 -93 -9 -155 -31 -46 -16 -201 -59 -345 -94 -144 -36 -294 -79 -335 -95 -96 -41 -464 -236 -553 -294 -106 -69 -337 -269 -362 -313 -12 -22 -39 -86 -61 -144 -21 -58 -55 -136 -74 -175 -57 -112 -101 -226 -172 -440 -36 -110 -80 -240 -97 -290 -64 -186 -72 -250 -44 -360 16 -60 166 -358 263 -523 165 -280 368 -506 678 -754 154 -123 275 -195 566 -337 276 -135 386 -179 498 -200 128 -24 358 -44 535 -46 123 -1 190 -6 193 -13 12 -37 -148 -234 -387 -473 l-196 -196 -207 -87 c-113 -49 -209 -94 -212 -102 -3 -8 5 -69 19 -136 22 -111 26 -124 61 -159 76 -78 172 -97 489 -98 197 -1 403 14 493 34 108 25 235 101 405 243 116 97 493 467 557 548 54 67 311 488 370 604 21 41 59 127 85 190 26 63 89 212 140 330 112 262 144 355 195 580 52 224 56 287 36 485 -43 412 -121 737 -269 1122 -51 130 -52 132 -182 293 -65 80 -171 224 -235 320 -134 200 -211 279 -434 443 -143 105 -224 150 -311 172 -154 38 -578 46 -770 15z"/></g></svg></div>
        <p>"${escapeHtml(state.query)}" 검색 결과가 없습니다</p>
        <p class="small">모델명 일부 또는 제품명으로 다시 검색해 보세요</p>
      </div>
    `;
    return;
  }

  const html = results.map((p, idx) => {
    const consumer = calcConsumer(p.p);
    const isDisc = p.s === '단종';
    const isNew = p.s === '신제품';
    return `
      <div class="product-card ${isDisc ? 'discontinued' : ''}" onclick="openSheet(${PRODUCTS.indexOf(p)})">
        <div class="product-main">
          <div class="product-code">${escapeHtml(p.c)}</div>
          <div class="product-name">${escapeHtml(p.n)}</div>
          <div class="product-tags">
            ${p.v ? `<span class="tag voltage">${escapeHtml(p.v)}</span>` : ''}
            ${p.b ? `<span class="tag baretool">BARETOOL</span>` : ''}
            ${isDisc ? `<span class="tag discontinued">단종</span>` : ''}
            ${isNew ? `<span class="tag new">신제품</span>` : ''}
            ${p.c1 ? `<span class="tag">${escapeHtml(p.c1)}</span>` : ''}
          </div>
        </div>
        <div class="product-right">
          <div class="price-consumer-label">소비자</div>
          <div class="price-consumer">${fmtPrice(consumer)}</div>
          <div class="price-dealer ${state.showDealer ? 'show' : ''}">
            <div class="price-dealer-label">대리점</div>
            ${fmtPrice(p.p)}
          </div>
        </div>
      </div>
    `;
  }).join('');

  resultsEl.innerHTML = html;
}

// ============================================
// 검색어 입력
// ============================================
const searchInput = document.getElementById('search');
const searchClear = document.getElementById('search-clear');

let searchTimer;
searchInput.addEventListener('input', e => {
  state.query = e.target.value;
  searchClear.classList.toggle('show', !!state.query);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 120);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  state.query = '';
  searchClear.classList.remove('show');
  render();
  searchInput.focus();
});

function setQuery(q) {
  searchInput.value = q;
  state.query = q;
  searchClear.classList.add('show');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function addRecent(q) {
  if (!q || q.length < 2) return;
  state.recent = [q, ...state.recent.filter(r => r !== q)].slice(0, 8);
  localStorage.setItem('wk_recent', JSON.stringify(state.recent));
}

function clearRecent() {
  state.recent = [];
  localStorage.removeItem('wk_recent');
  render();
}

// ============================================
// 대리점가 토글
// ============================================
document.getElementById('dealer-toggle').addEventListener('click', () => {
  state.showDealer = !state.showDealer;
  const btn = document.getElementById('dealer-toggle');
  const label = document.getElementById('dealer-toggle-label');
  btn.classList.toggle('visible', state.showDealer);
  label.textContent = state.showDealer ? '대리점가 숨기기' : '대리점가 보기';
  render();

  const sheetDealer = document.getElementById('sheet-dealer-block');
  if (sheetDealer) sheetDealer.classList.toggle('show', state.showDealer);

  if (state.showDealer) {
    toast('⚠ 대리점가(매입가) 표시 중 — 고객 화면 주의');
  }
});

// ============================================
// 상세 시트
// ============================================
const sheetBg = document.getElementById('sheet-bg');
const sheet = document.getElementById('sheet');

function openSheet(idx) {
  const p = PRODUCTS[idx];
  if (!p) return;
  state.currentProduct = p;

  // 최근 검색에 현재 쿼리 저장
  if (state.query) addRecent(state.query.trim());

  // 정보 채우기
  document.getElementById('sheet-code').textContent = p.c;
  document.getElementById('sheet-name').textContent = p.n;

  const tags = document.getElementById('sheet-tags');
  let tagHtml = '';
  if (p.v) tagHtml += `<span class="tag voltage">${escapeHtml(p.v)}</span>`;
  if (p.b) tagHtml += `<span class="tag baretool">BARETOOL</span>`;
  if (p.s === '단종') tagHtml += `<span class="tag discontinued">단종</span>`;
  if (p.s === '신제품') tagHtml += `<span class="tag new">신제품</span>`;
  if (p.c1) tagHtml += `<span class="tag">${escapeHtml(p.c1)}</span>`;
  if (p.c2 && p.c2 !== p.c1) tagHtml += `<span class="tag">${escapeHtml(p.c2)}</span>`;
  tags.innerHTML = tagHtml;

  const consumer = calcConsumer(p.p);
  document.getElementById('sheet-consumer-price').innerHTML = fmtPrice(consumer) + '<span class="won">원</span>';
  document.getElementById('sheet-dealer-price').innerHTML = fmtPrice(p.p) + '<span class="won">원</span>';

  // 대리점가 블록 표시 여부 (토글 상태 따라)
  document.getElementById('sheet-dealer-block').classList.toggle('show', state.showDealer);

  // 템플릿 프리뷰 업데이트
  updateTemplatePreview();

  // 시트 열기
  sheetBg.classList.add('show');
  sheet.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  sheet.classList.remove('show');
  sheetBg.classList.remove('show');
  document.body.style.overflow = '';
  state.currentProduct = null;

  // 복사 버튼 초기화
  const btn = document.getElementById('copy-btn');
  btn.classList.remove('copied');
  btn.querySelector('span').textContent = '고객 안내 문자 복사';
}

sheetBg.addEventListener('click', closeSheet);

// 시트 드래그다운 (간단 구현)
let dragStartY = 0, dragY = 0, isDragging = false;
sheet.addEventListener('touchstart', e => {
  if (sheet.scrollTop > 0) return;
  dragStartY = e.touches[0].clientY;
  isDragging = true;
}, { passive: true });
sheet.addEventListener('touchmove', e => {
  if (!isDragging) return;
  dragY = e.touches[0].clientY - dragStartY;
  if (dragY > 0) {
    sheet.style.transform = `translateY(${dragY}px)`;
  }
}, { passive: true });
sheet.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  if (dragY > 100) {
    closeSheet();
  }
  sheet.style.transform = '';
  dragY = 0;
});

// ============================================
// 템플릿 탭
// ============================================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentTemplate = btn.dataset.template;
    updateTemplatePreview();
  });
});

// ============================================
// 템플릿 생성 (소비자가만 포함, 대리점가 절대 미포함)
// ============================================
function buildTemplate(type, p) {
  const consumer = calcConsumer(p.p);
  const consumerStr = fmtPrice(consumer) + '원';

  if (type === 'A') {
    // 담백형
    return `안녕하세요, WORKNIC입니다.

[${p.n}]
모델: ${p.c}
판매가: ${consumerStr} (VAT 포함)

문의 주신 제품 안내드립니다.
재고 및 상세 사양은 회신 부탁드립니다.

포천 WORKNIC
1833-3640`;
  }

  if (type === 'B') {
    // 브랜드형
    return `, WORKNIC

${p.c}
${consumerStr}

도구를 고르는 기준은,
결국 삶의 태도입니다.

포천 WORKNIC  1833-3640
worknic.co.kr`;
  }

  if (type === 'C') {
    // 실무형
    return `[WORKNIC 가격 안내]

▪ 모델: ${p.c}
▪ 제품명: ${p.n}
▪ 판매가: ${consumerStr} (VAT 포함)

※ 재고 확인 후 출고 가능
※ 문의: 1833-3640

포천 WORKNIC`;
  }

  return '';
}

function updateTemplatePreview() {
  if (!state.currentProduct) return;
  const text = buildTemplate(state.currentTemplate, state.currentProduct);
  const box = document.getElementById('template-preview');
  // "쉼표" 문자를 SVG로 바꾸지는 않음 - 복사 시 원문 그대로 가야 함
  box.textContent = text;
}

// ============================================
// 복사 버튼 (소비자가만!)
// ============================================
document.getElementById('copy-btn').addEventListener('click', async () => {
  if (!state.currentProduct) return;
  const text = buildTemplate(state.currentTemplate, state.currentProduct);

  try {
    // 모바일에서 가장 안정적인 클립보드 복사
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    btn.querySelector('span').textContent = '✓ 복사 완료';
    toast('문자가 복사되었습니다');

    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = '고객 안내 문자 복사';
    }, 1800);
  } catch (err) {
    toast('복사 실패 - 텍스트를 직접 선택해 주세요');
    console.error(err);
  }
});

// ============================================
// Toast
// ============================================
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================
// ESC로 시트 닫기 (데스크탑)
// ============================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
});

// ============================================
// 초기 렌더
// ============================================
render();
</script>
